<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 8px;
            border: 1px solid #ccc;
            text-align: center;
        }

        .total {
            color: red;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
        }
    </style>
</head>

<body>

<h1 style="text-align:center; margin-bottom:30px;"> Expense Tracker </h1>

<h2>Add Expense</h2>

<form th:action="@{/add}" th:object="${expense}" method="post">
    <label>Name:</label>
    <input type="text" th:field="*{name}" required>

    <label>Amount:</label>
    <input type="number" step="0.01" th:field="*{amount}" required>

    <button type="submit">Add</button>
</form>

<hr>

<h2>Expenses</h2>

<table border="1" cellpadding="8" style="border-collapse: collapse; width: 60%;">
    <thead>
    <tr>
        <th>Name</th>
        <th>Amount</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>

    <tr th:each="expense : ${expenses}">
        <td th:text="${expense.name}"></td>
        <td>$ <span th:text="${expense.amount}"></span></td>
        <td>
            <form th:action="@{/delete/{id}(id=${expense.id})}" method="post">
                <button type="submit">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<h2
    style="color:red; font-weight:bold;">
    Total Expense: $ <span th:text="${total}"></span>
</h2>

</body>
</html>
